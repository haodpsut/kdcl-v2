<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khảo sát KĐCLGD – Biểu 08-11</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #eef1f4;  --panel:   #ffffff;  --border:  #d9dce1;
  --accent:  #990000;  --accent2: #5c0000;  --green:   #1a7f4b;
  --red:     #c0392b;  --yellow:  #b26a00;  --text:    #1c1e21;
  --muted:   #64748b;  --hover:   #eef1f4;  --sidebar: 270px;
}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.topnav { background:var(--panel); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:0; height:44px; flex-shrink:0; }
.topnav .brand { font-size:13px; font-weight:800; color:var(--accent); margin-right:24px; white-space:nowrap; }
.nav-link { display:flex; align-items:center; gap:6px; height:44px; padding:0 16px; font-size:13px; font-weight:600; color:var(--muted); text-decoration:none; border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; }
.nav-link:hover { color:var(--text); }
.nav-link.active { color:var(--accent); border-bottom-color:var(--accent); }
.layout { display:flex; flex:1; overflow:hidden; }

/* Sidebar */
#sidebar { width:var(--sidebar); background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sidebar-header h2 { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.type-tabs { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.type-tab { flex:1; min-width:56px; padding:5px 4px; background:var(--hover); border:1px solid var(--border); border-radius:6px; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; text-align:center; transition:all .15s; }
.type-tab:hover { color:var(--text); }
.type-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.survey-list { flex:1; overflow-y:auto; padding:8px; }
.survey-item { padding:9px 11px; border-radius:8px; cursor:pointer; border:1px solid transparent; margin-bottom:4px; transition:all .15s; }
.survey-item:hover { background:var(--hover); }
.survey-item.active { background:var(--hover); border-color:var(--border); }
.survey-item .s-title { font-size:13px; font-weight:600; margin-bottom:3px; }
.survey-item .s-meta { font-size:11px; color:var(--muted); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.badge-type { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
.badge-b08 { background:#99000020; color:#990000; }
.badge-b09 { background:#1a7f4b20; color:#1a7f4b; }
.badge-b10 { background:#b26a0020; color:#b26a00; }
.badge-b11 { background:#5c000020; color:#7c3aed; }
.badge-closed { background:#c0392b20; color:#c0392b; }
.badge-open   { background:#1a7f4b20; color:#1a7f4b; }
.btn-add-survey { display:block; width:calc(100% - 16px); margin:8px; padding:8px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; }
.btn-add-survey:hover { opacity:.85; }

/* Main */
#main { flex:1; overflow-y:auto; padding:24px 28px; }
.overview-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
.ov-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
.ov-card .ov-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; margin-bottom:6px; }
.ov-card .ov-num { font-size:28px; font-weight:800; }
.ov-card .ov-sub  { font-size:11px; color:var(--muted); margin-top:4px; }
.ov-b08 .ov-num { color:#990000; }
.ov-b09 .ov-num { color:#1a7f4b; }
.ov-b10 .ov-num { color:#b26a00; }
.ov-b11 .ov-num { color:#7c3aed; }

/* Survey detail */
.detail-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:20px; }
.detail-header .d-info { flex:1; }
.detail-header h1 { font-size:18px; font-weight:700; margin-bottom:6px; }
.detail-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
.detail-actions { display:flex; gap:8px; align-items:center; }
.btn { padding:7px 14px; border-radius:7px; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.85; }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { opacity:.85; }
.btn-ghost { background:var(--hover); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--border); }
.toggle-wrap { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
.toggle { position:relative; display:inline-block; width:36px; height:20px; }
.toggle input { display:none; }
.toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:.2s; }
.toggle-slider::before { content:''; position:absolute; left:3px; top:3px; width:14px; height:14px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--green); }
.toggle input:checked + .toggle-slider::before { transform:translateX(16px); }

/* Share link */
.share-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.share-box .share-label { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; }
.share-url { flex:1; font-size:12px; color:var(--accent); font-family:monospace; word-break:break-all; }
.btn-copy { padding:5px 11px; border-radius:6px; border:none; background:var(--hover); color:var(--text); font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn-copy:hover { background:var(--border); }

/* Stats */
.stats-grid { display:grid; grid-template-columns:180px 1fr; gap:20px; margin-bottom:24px; }
.overall-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.overall-num { font-size:52px; font-weight:900; line-height:1; }
.overall-label { font-size:11px; color:var(--muted); text-align:center; }
.overall-sub { font-size:12px; color:var(--muted); }
.chart-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
.chart-card h3 { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
.q-bar-wrap { margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.q-bar-label { font-size:11px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; }
.q-bar-text { font-size:11px; color:var(--text); width:280px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.q-bar-track { flex:1; height:14px; background:var(--border); border-radius:7px; overflow:hidden; }
.q-bar-fill { height:100%; border-radius:7px; transition:width .4s; }
.q-bar-val { font-size:12px; font-weight:700; width:30px; text-align:right; }

/* Distribution */
.dist-section { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:20px; }
.dist-section h3 { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:14px; }
.dist-row { margin-bottom:10px; }
.dist-label { font-size:11px; color:var(--muted); margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dist-bars { display:flex; height:16px; border-radius:8px; overflow:hidden; gap:1px; }
.dist-seg { display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; transition:flex .4s; min-width:0; }
.dist-legend { display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
.dist-leg-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--muted); }
.dist-dot { width:10px; height:10px; border-radius:2px; }

/* Comments */
.comments-section { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
.comments-section h3 { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
.comment-item { padding:8px 10px; background:var(--hover); border-radius:6px; font-size:12px; color:var(--text); margin-bottom:6px; line-height:1.5; }
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); font-size:13px; }

/* Modal */
.modal-backdrop { display:none; position:fixed; inset:0; background:#00000080; z-index:100; align-items:center; justify-content:center; }
.modal-backdrop.open { display:flex; }
.modal { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px; width:440px; max-width:94vw; }
.modal h2 { font-size:15px; font-weight:700; margin-bottom:16px; }
.form-row { margin-bottom:14px; }
.form-row label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; }
.form-row input, .form-row select, .form-row textarea { width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:13px; font-family:inherit; }
.form-row textarea { resize:vertical; min-height:70px; }
.form-row select option { background:var(--panel); }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; padding:10px 16px; border-radius:8px; font-size:13px; font-weight:600; z-index:200; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:#1a7f4b; color:#fff; }
.toast.error   { background:#c0392b; color:#fff; }
</style>

<div class="layout">
<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-header"><h2>Danh sách khảo sát</h2></div>
  <div class="type-tabs">
    <button class="type-tab active" onclick="filterType('all')">Tất cả</button>
    <button class="type-tab" onclick="filterType('bieu08')">B.08</button>
    <button class="type-tab" onclick="filterType('bieu09')">B.09</button>
    <button class="type-tab" onclick="filterType('bieu10')">B.10</button>
    <button class="type-tab" onclick="filterType('bieu11')">B.11</button>
  </div>
  <div class="survey-list" id="survey-list"></div>
  <button class="btn-add-survey" onclick="openCreateModal()">＋ Tạo khảo sát mới</button>
</aside>

<!-- Main -->
<main id="main">
  <div id="overview-section">
    <div class="overview-cards" id="overview-cards"></div>
    <div class="empty-state">Chọn một khảo sát để xem kết quả chi tiết.</div>
  </div>
  <div id="detail-section" style="display:none"></div>
</main>
</div>

<!-- Create Modal -->
<div class="modal-backdrop" id="modal-create">
  <div class="modal">
    <h2>📝 Tạo khảo sát mới</h2>
    <div class="form-row">
      <label>Loại khảo sát *</label>
      <select id="f-type" onchange="onTypeChange()">
        <option value="">-- Chọn loại --</option>
        <option value="bieu08">Biểu 08 – Cán bộ / Giảng viên</option>
        <option value="bieu09">Biểu 09 – Người học (Sinh viên)</option>
        <option value="bieu10">Biểu 10 – Nhà tuyển dụng</option>
        <option value="bieu11">Biểu 11 – Cựu sinh viên</option>
      </select>
    </div>
    <div class="form-row">
      <label>Tiêu đề khảo sát *</label>
      <input type="text" id="f-title" placeholder="VD: Khảo sát SV Đợt ĐGN 2025-2026">
    </div>
    <div class="form-row">
      <label>Ghi chú (không bắt buộc)</label>
      <textarea id="f-desc" placeholder="Mục đích, đối tượng, thời gian..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="createSurvey()">Tạo khảo sát</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let surveys = [];
let activeSurveyId = null;
let currentFilter = 'all';
const TYPE_DEFAULTS = {
  bieu08: 'Phiếu khảo sát Cán bộ, Giảng viên',
  bieu09: 'Phiếu khảo sát Người học',
  bieu10: 'Phiếu khảo sát Nhà tuyển dụng',
  bieu11: 'Phiếu khảo sát Cựu sinh viên',
};
const TYPE_COLORS = { bieu08:'#990000', bieu09:'#1a7f4b', bieu10:'#b26a00', bieu11:'#7c3aed' };
const DIST_COLORS = ['#c0392b','#b26a00','#606770','#990000','#1a7f4b'];

function typeBadge(type) {
  const m = { bieu08:'badge-b08', bieu09:'badge-b09', bieu10:'badge-b10', bieu11:'badge-b11' };
  const l = { bieu08:'Biểu 08', bieu09:'Biểu 09', bieu10:'Biểu 10', bieu11:'Biểu 11' };
  return `<span class="badge-type ${m[type]||''}">${l[type]||type}</span>`;
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  await loadSurveys();
})();

async function loadSurveys() {
  surveys = await fetch('/api/surveys').then(r => r.json());
  renderSidebar();
  renderOverview();
  if (activeSurveyId) await selectSurvey(activeSurveyId);
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function filterType(t) {
  currentFilter = t;
  document.querySelectorAll('.type-tab').forEach((el, i) => {
    const types = ['all','bieu08','bieu09','bieu10','bieu11'];
    el.classList.toggle('active', types[i] === t);
  });
  renderSidebar();
}

function renderSidebar() {
  const list = currentFilter === 'all' ? surveys : surveys.filter(s => s.type === currentFilter);
  document.getElementById('survey-list').innerHTML = list.length
    ? list.map(s => `
      <div class="survey-item ${s.id === activeSurveyId ? 'active' : ''}" onclick="selectSurvey(${s.id})">
        <div class="s-title">${escHtml(s.title)}</div>
        <div class="s-meta">
          ${typeBadge(s.type)}
          <span class="badge-type ${s.active ? 'badge-open' : 'badge-closed'}">${s.active ? 'Đang mở' : 'Đã đóng'}</span>
          <span>${s.response_count} phản hồi</span>
        </div>
      </div>`).join('')
    : '<div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">Chưa có khảo sát</div>';
}

// ── Overview ─────────────────────────────────────────────────────────────────
function renderOverview() {
  if (activeSurveyId) return;
  const types = [
    { key:'bieu08', cls:'ov-b08', label:'Biểu 08 – CB/GV' },
    { key:'bieu09', cls:'ov-b09', label:'Biểu 09 – Người học' },
    { key:'bieu10', cls:'ov-b10', label:'Biểu 10 – NTD' },
    { key:'bieu11', cls:'ov-b11', label:'Biểu 11 – Cựu SV' },
  ];
  document.getElementById('overview-cards').innerHTML = types.map(t => {
    const list = surveys.filter(s => s.type === t.key);
    const total = list.reduce((a, s) => a + s.response_count, 0);
    return `<div class="ov-card ${t.cls}">
      <div class="ov-label">${t.label}</div>
      <div class="ov-num">${total}</div>
      <div class="ov-sub">${list.length} khảo sát · ${total} phản hồi</div>
    </div>`;
  }).join('');
}

// ── Select & render detail ────────────────────────────────────────────────────
async function selectSurvey(id) {
  activeSurveyId = id;
  renderSidebar();
  document.getElementById('overview-section').style.display = 'none';
  document.getElementById('detail-section').style.display = '';
  document.getElementById('detail-section').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Đang tải...</div>';

  const [survey, stats] = await Promise.all([
    fetch(`/api/surveys/${id}`).then(r => r.json()),
    fetch(`/api/surveys/${id}/stats`).then(r => r.json()),
  ]);
  renderDetail(survey, stats);
}

function renderDetail(s, stats) {
  const tpl = s.template || {};
  const questions = tpl.questions || [];
  const scale = tpl.scale || ['1','2','3','4','5'];
  const color = TYPE_COLORS[s.type] || '#990000';
  const shareUrl = `${location.origin}/survey-fill.html?token=${s.token}`;

  // Overall score color
  const ov = stats.overall || 0;
  const ovColor = ov >= 4 ? '#1a7f4b' : ov >= 3 ? '#b26a00' : '#c0392b';

  // Q bars
  const qBars = questions.map((q, i) => {
    const avg = (stats.averages || [])[i] || 0;
    const pct = avg / 5 * 100;
    const barColor = avg >= 4 ? '#1a7f4b' : avg >= 3 ? '#990000' : '#b26a00';
    return `<div class="q-bar-wrap">
      <span class="q-bar-label">C${i+1}</span>
      <span class="q-bar-text" title="${escHtml(q)}">${escHtml(q)}</span>
      <div class="q-bar-track"><div class="q-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <span class="q-bar-val" style="color:${barColor}">${avg}</span>
    </div>`;
  }).join('');

  // Distribution
  const distRows = questions.map((q, i) => {
    const d = (stats.distribution || [])[i] || [0,0,0,0,0];
    const total = d.reduce((a,b) => a+b, 0) || 1;
    const segs = d.map((v, vi) => {
      const pct = Math.round(v/total*100);
      return pct > 0
        ? `<div class="dist-seg" style="flex:${pct};background:${DIST_COLORS[vi]}">${pct >= 8 ? pct+'%' : ''}</div>`
        : '';
    }).join('');
    return `<div class="dist-row">
      <div class="dist-label" title="${escHtml(q)}">C${i+1}. ${escHtml(q)}</div>
      <div class="dist-bars">${segs || '<div style="flex:1;background:var(--border)"></div>'}</div>
    </div>`;
  }).join('');

  const distLegend = scale.map((l, i) =>
    `<div class="dist-leg-item"><div class="dist-dot" style="background:${DIST_COLORS[i]}"></div>${i+1} – ${escHtml(l)}</div>`
  ).join('');

  // Comments
  const comments = (stats.comments || []).length
    ? [...stats.comments].reverse().map(c => `<div class="comment-item">${escHtml(c)}</div>`).join('')
    : '<div style="color:var(--muted);font-size:12px">Chưa có ý kiến nào.</div>';

  document.getElementById('detail-section').innerHTML = `
    <!-- Header -->
    <div class="detail-header">
      <div class="d-info">
        <h1>${escHtml(s.title)}</h1>
        <div class="detail-meta">
          ${typeBadge(s.type)}
          <span>${tpl.target || ''}</span>
          <span>·</span>
          <span>Tạo: ${s.created_at}</span>
          ${s.description ? `<span>·</span><span>${escHtml(s.description)}</span>` : ''}
        </div>
      </div>
      <div class="detail-actions">
        <div class="toggle-wrap">
          <span>Trạng thái:</span>
          <label class="toggle">
            <input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${s.id}, this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span id="active-label">${s.active ? 'Đang mở' : 'Đã đóng'}</span>
        </div>
        <button class="btn btn-danger" onclick="deleteSurvey(${s.id},'${escHtml(s.title).replace(/'/g,"\\'")}')">Xoá</button>
      </div>
    </div>

    <!-- Share link -->
    <div class="share-box">
      <span class="share-label">🔗 Link khảo sát:</span>
      <span class="share-url" id="share-url">${shareUrl}</span>
      <button class="btn-copy" onclick="copyLink()">Sao chép</button>
      <a href="${shareUrl}" target="_blank" class="btn-copy" style="text-decoration:none">Mở ↗</a>
    </div>

    ${stats.count === 0 ? `
      <div class="empty-state">
        <div style="font-size:36px;margin-bottom:12px">📭</div>
        <div>Chưa có phản hồi nào.</div>
        <div style="margin-top:8px;font-size:12px">Chia sẻ link trên để bắt đầu thu thập dữ liệu.</div>
      </div>
    ` : `
      <!-- Stats -->
      <div class="stats-grid">
        <div class="overall-card">
          <div class="overall-num" style="color:${ovColor}">${ov}</div>
          <div class="overall-label">/ 5.0<br>Điểm trung bình</div>
          <div class="overall-sub">${stats.count} phản hồi</div>
        </div>
        <div class="chart-card">
          <h3>Điểm trung bình theo câu hỏi</h3>
          ${qBars}
        </div>
      </div>

      <!-- Distribution -->
      <div class="dist-section">
        <h3>Phân bố điểm theo câu hỏi</h3>
        ${distRows}
        <div class="dist-legend">${distLegend}</div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <h3>Ý kiến bổ sung (${(stats.comments||[]).length} ý kiến gần nhất)</h3>
        ${comments}
      </div>
    `}
  `;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function toggleActive(id, active) {
  await fetch(`/api/surveys/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ active })
  });
  document.getElementById('active-label').textContent = active ? 'Đang mở' : 'Đã đóng';
  await loadSurveys();
  showToast('success', active ? '✅ Đã mở khảo sát' : '🔒 Đã đóng khảo sát');
}

async function deleteSurvey(id, name) {
  if (!confirm(`Xoá khảo sát "${name}"?\nTất cả ${surveys.find(s=>s.id===id)?.response_count||0} phản hồi sẽ bị xoá.`)) return;
  await fetch(`/api/surveys/${id}`, { method:'DELETE' });
  activeSurveyId = null;
  document.getElementById('overview-section').style.display = '';
  document.getElementById('detail-section').style.display = 'none';
  await loadSurveys();
  renderOverview();
  showToast('success', '✅ Đã xoá khảo sát');
}

function copyLink() {
  const url = document.getElementById('share-url')?.textContent;
  if (!url) return;
  navigator.clipboard.writeText(url).then(() => showToast('success', '✅ Đã sao chép link'));
}

// ── Create Modal ──────────────────────────────────────────────────────────────
function openCreateModal() { document.getElementById('modal-create').classList.add('open'); }
function closeModal() { document.getElementById('modal-create').classList.remove('open'); }

function onTypeChange() {
  const type = document.getElementById('f-type').value;
  const titleEl = document.getElementById('f-title');
  if (type && !titleEl.value) titleEl.value = TYPE_DEFAULTS[type] || '';
}

async function createSurvey() {
  const type  = document.getElementById('f-type').value;
  const title = document.getElementById('f-title').value.trim();
  const desc  = document.getElementById('f-desc').value.trim();
  if (!type)  return showToast('error', '❌ Chọn loại khảo sát');
  if (!title) return showToast('error', '❌ Nhập tiêu đề');

  const res  = await fetch('/api/surveys', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type, title, description: desc }),
  });
  const data = await res.json();
  if (!res.ok) return showToast('error', `❌ ${data.error}`);
  closeModal();
  document.getElementById('f-type').value  = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value  = '';
  await loadSurveys();
  await selectSurvey(data.id);
  showToast('success', `✅ Đã tạo khảo sát – Token: ${data.token}`);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(type, msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
